<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Electricity Consumption Classifier</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" href="styles.css">
</head>


<body>
<div>



    
</div>
    <script>
    function evaluateScore(){
        var score = document.getElementById("score").value;

        if(score=== ""){
            alert("Please enter a score");
            return;
        }

        score = Number(score);
        var status = "";   
        
        if(score >= 75){
            status = "Status: PASSED";
        }else{
            status = "Status: FAILED";
        }

        var grade = ""
        if(score==90){
            grade = "A";
        }

        else if(score>=80){
            grade="B";
        }

        else if(score>=75){
            grade="C";
        }

        else{
            grade="F";

        }

        var remark = "";
        switch(grade){
            case "A":
            remark="Excellent";
            break;

            case "B":
            remark="Good!";
            break;

            case "C":
            remark="Okay.";
            break;

            default:
                remark = "Needs Improvement";
        }

        document.getElementById("status").innerHTML= status;
        document.getElementById("grade").innerHTML ="Grade: " + grade + " " + remark
    }

</script>
      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
