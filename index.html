<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRACTICE ACTIVITY</title>

        <style>
body{
    font-family: Arial, Helvetica, sans-serif;
    text-align: center;
    margin-top: 80px;
    background-color: pink;
}

    .container{
        background: white;
        padding: 20px;
        width: 300px;
        margin: auto;
        border: 1px solid #ccc;
    }

input{
    padding: 6px;
    width: 80%;
    margin-bottom: 10px;
}

button{padding: 8px 15px;}

.output{
    margin-top: 15px;
    text-align: left;
}
    </style>

</head>
<body>

<div class="container">
    <h2>Student Score Evaluator</h2>

    <input type="number" id="score" placeholder="Enter Score (0-100)">
    <br>

<button onclick="evaluateScore()"> Evaluate Score</button>


<div class="output">
    <p id="status"> </p>
    <p id="grade"> </p>
</div>

</div>

<script>
    function evaluateScore(){
        var score = document.getElementById("score").value;
        if(score===""){
            alert.("Please enter a score.")
            return;
        }
        score = Number(score);
        var status = "";

        if(score >= 75){
            status = "Status: PASSED";
        } else{
            status = "Status: FAILED";
        }


        var grade = "";
        if(score >= 90){
            grade="A";
        }else if(score >= 80){
            grade="B";
        }else if(score >= 75){
            grade="C"
        }else if(score >= 60){
            grade="F";
        }

        var remark = "";
        switch(grade){
            case="A":
            remark="Excellent!";
            break;
            case "B":
            remark="Good!";
            break;
            case "C":
            remark="Average.";
            break;

            default;
            remark="Needs improvement";
        }

        document.getElementById("status").innerHTML= status;
        document.getElementById("grade").innerHTML = "Grade:" + grade + remark;
    }

</script>
</body>
</html>
