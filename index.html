<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRILL</title>

    <style>
        body{
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            text-align: center;
            margin-top: 80px;
            background-color: antiquewhite;           
        }

        .container{
            background-color: bisque;
            width: 300px;
            margin: auto;
            border: 1px solid #ccc;
        }

        input{
            padding: 6px;
            width: 80%;
            margin-bottom: 10px;
        }

        button{
            padding: 8px 15px;
        }
           
        .output{
            margin-top: 10px;
            text-align: left;

        }
        
    </style>

</head>
<body>

<div class="container">

    <h2> ELECTRICITY CONSUMPTION CLASSIFIER</h2>

    <input type="number" id="score" placeholder="Please enter kWh per hour">

    <br>

    <button onclick="evaluateScore()"> CONSUMPTION CLASSIFICATION</button>

    <div class="output">

    <p id="status"> </p>
    <p id="grade"> </p>

    </div>

</div>

<script>
    function evaluateScore(){
        var score = document.getElementById("score").value;

        if(score=== ""){
            alert("Please enter kWh per hour");
            return;
        }

        score = Number(score);
        var status = "";   

        var grade = ""
        if(score>=500){
            grade = "A";
        }

        else if(score>=300){
            grade="B";
        }

        else if(score>=200){
            grade="C";
        }

        else if(score>=100){
            grade="C";
        }

        else if(score>=200){
            grade="C";
        }

        var remark = "";
        switch(grade){
            case "A":
            remark="Excellent";
            break;

            case "B":
            remark="Above Average";
            break;

            case "C":
            remark="Mid";
            break;

            default:
                remark = "Needs Improvement";
        }

        document.getElementById("status").innerHTML= status;
        document.getElementById("grade").innerHTML ="Grade: " + grade + " " + remark


    }

</script>

    
</body>
</html>
