    <script>
function evaluateElectricity(){

    var electricity = Number(document.getElementById("electricity").value);

    if(electricity <= 0){
        alert("Please enter a valid amount.");
        return;
    }

    if(electricity <= 100){
        alert("Lifeline Consumer: Discounted electricity rates");
    }
    else if(electricity <= 200){
        alert("Low Consumption: Normal Residential rate");
    }
    else if(electricity <= 300){
        alert("Average Consumption: Typical electricity usage");
    }
    else if(electricity <= 500){
        alert("High Consumption: Higher electricity usage");
    }
    else{
        alert("Very High Consumption: Higher electricity usage");
    }
}
