<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Electricity Consumption Rate</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background-color: rgb(253, 211, 74);
    text-align: center;
    margin-top: 80px;
    font-family: 'Times New Roman', Times, serif;
}

.container{
    background: white;
    padding: 20px;
    width: 500px;
    margin: auto;
}

input{
    padding: 6px;
    width: 80%;
    margin-bottom: 10px;
}

.output{
    margin-top: 15px;
    text-align: left;
}
</style>
</head>

<body>

<div class="container">

<h2>Electricity Consumption Classifier</h2>

<input type="number" id="electricity" placeholder="Enter Electricity Usage in kWh">
<br>

<button class="btn btn-primary" onclick="evaluateElectricity()">EVALUATE!</button>

<div class="output">
<p id="consumption"></p>
<p id="status"></p>
</div>

</div>

<script>

function evaluateElectricity(){

    var electricity = Number(document.getElementById("electricity").value);

    var consumption = "";
    var status = "";

    if(electricity <= 0){
        consumption = "Please enter a valid electricity usage.";
        status = "";
    }

    else if(electricity <= 100){
        consumption = "Electricity Usage: " + electricity + " kWh";
        status = "Lifeline Consumer: Discounted electricity rates.";
    }

    else if(electricity <= 200){
        consumption = "Electricity Usage: " + electricity + " kWh";
        status = "Low Consumption: Normal residential rate.";
    }

    else if(electricity <= 300){
        consumption = "Electricity Usage: " + electricity + " kWh";
        status = "Average Consumption: Typical electricity usage.";
    }

    else if(electricity <= 500){
        consumption = "Electricity Usage: " + electricity + " kWh";
        status = "High Consumption: Higher electricity usage.";
    }

    else{
        consumption = "Electricity Usage: " + electricity + " kWh";
        status = "Very High Consumption: Very high electricity usage.";
    }

    document.getElementById("consumption").innerHTML = consumption;
    document.getElementById("status").innerHTML = status;

}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
